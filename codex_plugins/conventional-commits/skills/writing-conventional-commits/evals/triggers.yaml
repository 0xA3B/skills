version: 1
cases:
  - id: draft-commit-message
    prompt: >-
      Draft a Conventional Commit message for a change that adds trigger evaluation fixtures and a
      Codex CLI runner.
    expect: invoke
    rationale: The user is asking for Conventional Commit message construction.

  - id: split-current-changes
    prompt: >-
      Review my current changes and suggest how to split them into logical Conventional Commits.
    expect: invoke
    rationale: The user is asking for Conventional Commit split guidance.

  - id: validate-breaking-change-syntax
    prompt: >-
      Is "feat(api)!: remove legacy response fields" valid Conventional Commit syntax for a breaking
      change?
    expect: invoke
    rationale: The user is asking to validate Conventional Commit syntax.

  - id: conceptual-purpose-question
    prompt: >-
      What is the purpose of Conventional Commits?
    expect: skip
    rationale: The user is asking a conceptual question, not requesting the commit policy workflow.

  - id: git-command-question
    prompt: >-
      What git command shows the last five commits?
    expect: skip
    rationale: The user is asking about git usage, not Conventional Commit message policy.

  - id: commit-workflow-execution
    prompt: >-
      Commit the current work using Conventional Commits.
    expect: invoke
    rationale:
      The user is asking for commit execution, but also explicitly asks for Conventional Commits;
      the writing policy skill should be available for message construction even though it does not
      own staging or commit side effects.
