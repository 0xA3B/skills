version: 1
cases:
  - id: review-current-changes
    prompt: >-
      Review my current changes before I commit.
    expect: invoke
    rationale: The user asks for a pre-commit review of current changes.

  - id: review-worktree
    prompt: >-
      Review the worktree and fix anything valid.
    expect: invoke
    rationale: Worktree review is the default scope for this skill.

  - id: review-staged-changes
    prompt: >-
      Review the staged changes before I commit them.
    expect: invoke
    rationale: Staged changes are a narrow pre-commit review target.

  - id: review-what-we-changed
    prompt: >-
      We just finished coding. Review what we changed and clean up accepted issues.
    expect: invoke
    rationale: The user asks for post-session review of current changes.

  - id: review-current-wip
    prompt: >-
      Review my current WIP.
    expect: invoke
    rationale: Current WIP maps to current worktree or pre-commit changes.

  - id: review-wip-changes
    prompt: >-
      Can you review these work-in-progress changes before I commit?
    expect: invoke
    rationale: Work-in-progress changes before commit are review-changes scope.

  - id: casual-review-current-edits
    prompt: >-
      I made a couple refinements. Let me know what you think.
    expect: invoke
    rationale: The user asks for review of current worktree edits in a conversational way.

  - id: branch-review
    prompt: >-
      Review this branch against main before merge.
    expect: skip
    rationale: Branch review belongs to review-branch.

  - id: review-wip-branch
    prompt: >-
      Review this WIP branch before merge.
    expect: skip
    rationale: Branch-scoped WIP review belongs to review-branch.

  - id: pr-review
    prompt: >-
      Review PR #42 before it merges.
    expect: skip
    rationale: PR and branch review belong to review-branch.

  - id: receiving-feedback
    prompt: >-
      Triage these reviewer comments and fix the valid ones.
    expect: skip
    rationale: Handling existing feedback belongs to receiving-feedback.

  - id: conceptual-question
    prompt: >-
      What should a pre-commit review check for?
    expect: skip
    rationale: The user asks a conceptual question, not for a review workflow.

  - id: review-changes-skill-design
    prompt: >-
      What do you think about the review-changes skill trigger behavior?
    expect: skip
    rationale: The user asks about skill design, not for a worktree review.
